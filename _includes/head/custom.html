{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Page fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<!-- Masthead custom styling -->
<style>
  /* ── Masthead shell ── */
  .masthead {
    background: var(--global-bg-color) !important;
  }

  /* Single deep-navy accent line at the bottom */
  .masthead::after {
    height: 2px !important;
    background: #1e2d40 !important;
  }

  .masthead__inner-wrap {
    padding: 0.7em 1.5em !important;
  }

  /* ── Site title "Yupeng He" ── */
  .masthead__menu-item--lg a {
    font-family: 'Playfair Display', Georgia, serif !important;
    font-size: 1.25em !important;
    font-weight: 600 !important;
    letter-spacing: 0.01em !important;
    text-transform: none !important;
    color: #1e2d40 !important;
  }

  .masthead__menu-item--lg a:hover {
    color: #1e2d40 !important;
  }

  /* ── Nav links ── */
  .masthead__menu-item a {
    font-family: 'DM Sans', sans-serif !important;
    font-size: 0.82em !important;
    font-weight: 400 !important;
    letter-spacing: 0.02em !important;
    text-transform: none !important;
    color: #5a6a7a !important;
    border-bottom: none !important;
    transition: color 0.2s ease !important;
  }

  .masthead__menu-item a:hover {
    color: #1e2d40 !important;
  }

  /* ── Active page ── */
  .masthead__menu-item.selected a {
    color: #1e2d40 !important;
    font-weight: 500 !important;
    border-bottom: 2px solid #1e2d40 !important;
    pointer-events: none;
    cursor: default;
  }

  .masthead__menu-item.selected a:hover {
    color: #1e2d40 !important;
  }

  /* ── Theme toggle icon ── */
  #theme-toggle a {
    color: #b0bac4 !important;
    transition: color 0.2s ease !important;
  }

  #theme-toggle a:hover {
    color: #1e2d40 !important;
  }

  /* ── Mobile dropdown ── */
  .greedy-nav .hidden-links {
    background: var(--global-bg-color) !important;
    border: 1px solid #e0e5ea !important;
  }

  .hidden-links .masthead__menu-item {
    background: var(--global-bg-color) !important;
  }
</style>

<!-- Page-wide typography -->
<style>
  /* ── Body text → Lora ── */
  body,
  .page__content,
  .page__content p,
  .page__content li,
  .archive__item-excerpt,
  .author__bio,
  .sidebar p,
  .page__footer {
    font-family: 'Lora', Georgia, serif !important;
    font-size: 0.96em;
    line-height: 1.8;
  }

  /* ── Page & section headings → Playfair Display ── */
  h1, h2, h3, h4, h5, h6,
  .page__title,
  .archive__item-title,
  .archive__item-title a {
    font-family: 'Playfair Display', Georgia, serif !important;
    font-weight: 700 !important;
    letter-spacing: 0.01em;
  }

  /* ── CV & archive list headings ── */
  .archive h2 {
    font-family: 'Playfair Display', Georgia, serif !important;
    font-weight: 600 !important;
  }

  /* ── Sidebar name already set; keep Lora for bio ── */
  .author__name {
    font-family: 'Playfair Display', Georgia, serif !important;
  }
</style>

<!-- end custom head snippets -->
